        }

          display: inline-block;
          width: 120px;
          height: 68px;
        }

        .switch input {
          opacity: 0;
          width: 0;
          height: 0;
        }

        .slider {
          position: absolute;
          cursor: pointer;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background-color: #ccc;
          -webkit-transition: .4s;
          transition: .4s;
        }

        .slider:before {
          position: absolute;
          content: "";
          height: 52px;
          width: 52px;
          left: 8px;
          bottom: 8px;
          background-color: white;
          -webkit-transition: .4s;
          transition: .4s;
        }

        input:checked + .slider {
          background-color: #2196F3;
        }

        input:focus + .slider {
          box-shadow: 0 0 1px #2196F3;
        }

        input:checked + .slider:before {
          -webkit-transform: translateX(52px);
          -ms-transform: translateX(52px);
          transform: translateX(52px);
        }

        .slider.round {
          border-radius: 68px;
        }

        .slider.round:before {
          border-radius: 50%;

            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgb(0,0,0); 
            background-color: rgba(0,0,0,0.4);

        .modal-content {

            font-weight: bold;

            function haversine(lat1, lon1, lat2, lon2) {
                const R = 6371; // Radius of Earth in kilometers
                const dLat = (lat2 - lat1) * Math.PI / 180;  // deg2rad below
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = 
                    0.5 - Math.cos(dLat)/2 + 
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                    (1 - Math.cos(dLon))/2;

                return R * 2 * Math.asin(Math.sqrt(a));
            }

            function calculateBearing(startLat, startLng, destLat, destLng) {
              // Convert degrees to radians
              const toRadians = (degrees) => degrees * Math.PI / 180;
              const toDegrees = (radians) => radians * 180 / Math.PI;

              const startLatRad = toRadians(startLat);
              const startLngRad = toRadians(startLng);
              const destLatRad = toRadians(destLat);
              const destLngRad = toRadians(destLng);

              // Calculate the difference in longitude
              const deltaLng = destLngRad - startLngRad;

              // Calculate the bearing
              const y = Math.sin(deltaLng) * Math.cos(destLatRad);
              const x = Math.cos(startLatRad) * Math.sin(destLatRad) -
                        Math.sin(startLatRad) * Math.cos(destLatRad) * Math.cos(deltaLng);
              let bearing = Math.atan2(y, x);

              // Convert the bearing from radians to degrees
              bearing = toDegrees(bearing);

              // Ensure the bearing is a positive number between 0 and 360
              return (bearing + 360) % 360;
            }

            function getBearingArrow(bearing) {

                } else if (bearing >= 67.5 && bearing < 112.5) {
                    return '→'; // East
                } else if (bearing >= 112.5 && bearing < 157.5) {
                    return '↘'; // South-East
                } else if (bearing >= 157.5 && bearing < 202.5) {
                    return '↓'; // South
                } else if (bearing >= 202.5 && bearing < 247.5) {
                    return '↙'; // South-West
                } else if (bearing >= 247.5 && bearing < 292.5) {
                    return '←'; // West
                } else if (bearing >= 292.5 && bearing < 337.5) {
                    return '↖'; // North-West
                }
                return ''; // Should not happen

            function aggregateTableRows() {
                const tableBody = document.querySelector('#itineraryTable tbody');
                if (!tableBody) return;

                // First, reset any previous aggregation by making all rows visible and removing old counts
                const rows = Array.from(tableBody.querySelectorAll('tr'));
                rows.forEach(row => {
                    row.style.display = '';
                    if (row.cells.length > 2) {
                        const pointCell = row.cells[2];
                        // Use a regex to remove ' xN' from the end of the innerHTML
                        pointCell.innerHTML = pointCell.innerHTML.replace(/ x[0-9]+$/, '');
                    }
                });

                let lastVisibleRow = null;
                let consecutiveCount = 1;

                for (let i = 0; i < rows.length; i++) {
                    const currentRow = rows[i];
                    if (currentRow.cells.length <= 2) {
                        continue;
                    }
                    // Skip rows that are already hidden (shouldn't happen with reset, but good practice)
                    if (currentRow.style.display === 'none') {
                        continue;
                    }

                    if (lastVisibleRow && lastVisibleRow.cells.length > 2 && lastVisibleRow.cells[2].innerText.trim() === currentRow.cells[2].innerText.trim()) {
                        consecutiveCount++;
                        currentRow.style.display = 'none'; // Hide consecutive same row
                    } else {
                        // If we just finished a sequence of consecutive rows, update the count on the last visible one.
                        if (consecutiveCount > 1 && lastVisibleRow && lastVisibleRow.cells.length > 2) {
                            lastVisibleRow.cells[2].innerHTML += ` x${consecutiveCount}`;
                        }
                        // Start a new sequence.
                        lastVisibleRow = currentRow;
                        consecutiveCount = 1;
                    }
                }

                // After the loop, check if the very last rows were a consecutive sequence.
                if (consecutiveCount > 1 && lastVisibleRow && lastVisibleRow.cells.length > 2) {
                    lastVisibleRow.cells[2].innerHTML += ` x${consecutiveCount}`;
                }
            }

            function sortTable() {
                const tableBody = document.querySelector('#itineraryTable tbody');
                const rows = Array.from(tableBody.children);

                rows.sort((a, b) => {
                    const distanceA = parseFloat(a.cells[0].textContent.trim());
                    const distanceB = parseFloat(b.cells[0].textContent.trim());

                    if (isNaN(distanceA) && isNaN(distanceB)) return 0; // Both NaN, keep original order
                    if (isNaN(distanceA)) return 1; // A is NaN, B is a number, put A at the end
                    if (isNaN(distanceB)) return -1; // B is NaN, A is a number, put B at the end

                    return distanceA - distanceB;
                });

                while (tableBody.firstChild) {
                    tableBody.removeChild(tableBody.firstChild);
                }
                rows.forEach(row => tableBody.appendChild(row));
            }

            function formatTimeAgo(date) {
                const seconds = Math.floor((new Date() - date) / 1000);
                let interval = seconds / 31536000;
                if (interval > 1) {
                    return Math.floor(interval) + " years ago";
                }
                interval = seconds / 2592000;
                if (interval > 1) {
                    return Math.floor(interval) + " months ago";
                }
                interval = seconds / 86400;
                if (interval > 1) {
                    return Math.floor(interval) + " days ago";
                }
                interval = seconds / 3600;
                if (interval > 1) {
                    return Math.floor(interval) + " hours ago";
                }
                interval = seconds / 60;
                if (interval > 1) {
                    return Math.floor(interval) + " minutes ago";
                }
                return Math.floor(seconds) + " seconds ago";
            }

                if (tableContainer && currentPositionRow) {
                    if (isAutoScrollOn) {
                        currentPositionRow.scrollIntoView({ block: "center" });
                    }
                    currentPositionRow.classList.add('current-position-row');
                }
            }
            // Calculate remaining height for tableContainer
            const canvasHeight = document.getElementById('profileCanvas').offsetHeight;

            const totalOccupiedHeight = canvasHeight;
            const windowHeight = window.innerHeight;
            const remainingHeight = windowHeight - totalOccupiedHeight - 25;

            if (tableContainer) {
                tableContainer.style.height = `${remainingHeight}px`;
            }
    });
    </script>
    <div id="tableContainer" style="height: 200px; overflow-y: scroll;">
        <table border="1" width="100%" id="itineraryTable">
            <thead>
                <tr>
                    <th>Distance (km)</th>
                    <th>Height (m)</th>
                    <th>Point</th>
                    <th>Lat</th>
                    <th>Lon</th>
                    <th>From Current (km)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="startDistance"></td>
                    <td id="startHeight"></td>
                    <td><a id="startLink" href="">START</a></td>
                    <td id="startLat"></td>
                    <td id="startLon"></td>
                    <td id="startDistFromCurrent"></td>
                </tr>
                <tr id="currentPositionRow" style="display: none;">
                    <td id="currentDistance"></td>
                    <td id="currentHeight"></td>
                    <td><a id="currentLink" href="">Current Position</a></td>
                    <td id="currentLat"></td>
                    <td id="currentLon"></td>
                    <td id="currentDistFromCurrent"></td>
                </tr>
                <tr>
                    <td id="highestPointDistance"></td>
                    <td id="highestPointHeight"></td>
                    <td><a id="highestPointLink" href="">Highest Point</a></td>
                    <td id="highestPointLat"></td>
                    <td id="highestPointLon"></td>
                    <td id="highestPointDistFromCurrent"></td>
                </tr>
                <tr>
                    <td id="finishDistance"></td>
                    <td id="finishHeight"></td>
                    <td><a id="finishLink" href="">FINISH</a></td>
                    <td id="finishLat"></td>
                    <td id="finishLon"></td>
                    <td id="finishDistFromCurrent"></td>
                </tr>
                
            </tbody>
        </table>
    </div>
</body>
</html>
