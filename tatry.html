<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      text-align: center;
    }
    h1 {
      margin-bottom: 30px;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      max-width: 600px;
      margin: auto;
    }
    a {
      display: block;
      padding: 15px;
      background: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.3s;
    }
    a:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <h1>My Links</h1>

  <div class="links">
    <a href="https://piciud.github.io/tam.html" target="_blank">tam</a>
    <a href="https://piciud.github.io/czwartek.html" target="_blank">czwartek</a>
    <a href="https://piciud.github.io/piatek.html" target="_blank">piatek</a>
    <a href="https://piciud.github.io/piatek_roz_mok.html" target="_blank">piatek_roz_mok</a>
    <a href="https://piciud.github.io/piatek_mok_5sp.html" target="_blank">piatek_mok_5sp</a>
    <a href="https://piciud.github.io/sobota.html" target="_blank">sobota</a>
    <a href="https://piciud.github.io/sobota_krzyzne.html" target="_blank">sobota_krzyzne</a>
    <a href="https://piciud.github.io/nazad.html" target="_blank">nazad</a>
  </div>

</body>
</html>
